<div class="overlay" (click)="close.emit()">
  <div class="panel" [ngClass]="'panel-' + character.element" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="close.emit()">✕</button>

    <div class="panel-left">
      <div class="portrait-wrap" [ngClass]="'glow-' + character.element">
        <img [src]="character.portraitUrl" [alt]="character.name" class="portrait" />
      </div>
      <div class="stars">
        <span *ngFor="let s of stars" class="star">★</span>
      </div>
    </div>

    <div class="panel-right">
      <p class="detail-title">{{ character.title }}</p>
      <h2 class="detail-name">{{ character.name }}</h2>

      <div class="detail-badges">
        <span class="badge element-badge" [ngClass]="'tag-' + character.element">
          ✦ {{ elementLabel }}
        </span>
        <span class="badge weapon-badge">⚔ {{ weaponLabel }}</span>
        <span class="badge nation-badge" *ngIf="character.nation">
          ⛳ {{ character.nation }}
        </span>
        <span class="badge constellation-badge" *ngIf="character.constellation">
          ✦ {{ character.constellation }}
        </span>
      </div>

      <p class="detail-description">{{ character.description }}</p>
    </div>
  </div>
</div>
